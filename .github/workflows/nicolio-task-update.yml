name: Nicolio Task Update

on:
  push:
    branches: ["**"]

jobs:
  update-task-notes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update task notes via Nicolio API
        env:
          NICOLIO_API_URL: ${{ secrets.NICOLIO_API_URL }}
          NICOLIO_API_TOKEN: ${{ secrets.NICOLIO_API_TOKEN }}
          REPO_NAME: ${{ github.event.repository.name }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
        run: |
          python3 - <<'PYEOF'
          import os, re, subprocess, urllib.request, json, sys
          from datetime import datetime, timezone, timedelta

          API_URL   = os.environ["NICOLIO_API_URL"].rstrip("/")
          API_TOKEN = os.environ["NICOLIO_API_TOKEN"]
          REPO      = os.environ["REPO_NAME"]
          BEFORE    = os.environ["BEFORE_SHA"]
          AFTER     = os.environ["AFTER_SHA"]
          JST       = timezone(timedelta(hours=9))
          TASK_RE   = re.compile(
              r'task:([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})',
              re.IGNORECASE
          )

          # コミット一覧取得（初回push: BEFORE=000...の場合は最新1件のみ）
          if BEFORE.strip("0") == "":
              cmd = ["git", "log", "--format=%H %s", "-1", AFTER]
          else:
              cmd = ["git", "log", "--format=%H %s", f"{BEFORE}..{AFTER}"]

          result = subprocess.run(cmd, capture_output=True, text=True, check=True)

          commits = []
          for line in result.stdout.strip().splitlines():
              if not line:
                  continue
              parts = line.split(" ", 1)
              full_hash = parts[0]
              subject   = parts[1] if len(parts) > 1 else ""
              commits.append((full_hash[:7], subject))

          if not commits:
              print("No commits to process.")
              sys.exit(0)

          # task:UUID を抽出して集約 {task_id: [(short_hash, subject), ...]}
          task_map = {}
          for short_hash, subject in commits:
              for m in TASK_RE.finditer(subject):
                  tid = m.group(1).lower()
                  task_map.setdefault(tid, []).append((short_hash, subject))

          if not task_map:
              print("No task: references found in commits.")
              sys.exit(0)

          def api_request(method, path, body=None):
              url = f"{API_URL}/{path}"
              data = json.dumps(body).encode() if body else None
              headers = {
                  "Authorization": f"Bearer {API_TOKEN}",
                  "Content-Type": "application/json",
              }
              req = urllib.request.Request(url, data=data, headers=headers, method=method)
              try:
                  with urllib.request.urlopen(req) as resp:
                      return resp.status, json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  return e.code, {}

          # タスクごとに notes を更新
          now_jst = datetime.now(JST).strftime("%Y-%m-%d %H:%M JST")

          for task_id, commit_list in task_map.items():
              status, data = api_request("GET", f"tasks?id=eq.{task_id}&select=id,notes")
              if status != 200 or not data:
                  print(f"[SKIP] task:{task_id} — not found (HTTP {status})")
                  continue

              current_notes = data[0].get("notes") or ""
              new_lines = [
                  f"【{REPO} {now_jst}】{subject}（{short_hash}）"
                  for short_hash, subject in commit_list
              ]
              new_notes = (current_notes + "\n" if current_notes else "") + "\n".join(new_lines)

              patch_status, _ = api_request("PATCH", f"tasks?id=eq.{task_id}", {"notes": new_notes})
              if patch_status in (200, 204):
                  for line in new_lines:
                      print(f"[OK] {line}")
              else:
                  print(f"[FAIL] task:{task_id} — PATCH failed (HTTP {patch_status})")
          PYEOF
