name: 🔥 本番環境デプロイ（手動のみ）
on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: '本番デプロイを実行しますか？'
        required: true
        default: 'no'
        type: choice
        options:
        - 'no'
        - 'yes'
      message:
        description: 'デプロイ理由・メモ'
        required: false
        default: ''

jobs:
  validate-and-deploy:
    name: 検証＆本番環境デプロイ
    runs-on: ubuntu-latest

    steps:
    - name: ⚠️ 確認チェック
      if: github.event.inputs.confirmation != 'yes'
      run: |
        echo "❌ デプロイがキャンセルされました"
        echo "確認欄で 'yes' を選択してください"
        exit 1

    - name: 📂 ファイル取得
      uses: actions/checkout@v4

    - name: 🐘 PHP環境セットアップ
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.1'

    - name: 🔍 PHP構文チェック
      run: |
        echo "PHPファイルの構文チェックを実行..."
        error_count=0
        while IFS= read -r file; do
          if ! php -l "$file" > /dev/null 2>&1; then
            echo "❌ 構文エラー: $file"
            php -l "$file"
            error_count=$((error_count + 1))
          fi
        done < <(find ./wts -name "*.php" -type f)

        if [ $error_count -gt 0 ]; then
          echo "❌ ${error_count}件の構文エラーが見つかりました。デプロイを中止します。"
          exit 1
        fi
        echo "✅ 全PHPファイルの構文チェック完了"

    - name: 🔒 セキュリティチェック
      run: |
        echo "本番デプロイ前セキュリティチェック..."

        # .envファイルが含まれていないことを確認
        if [ -f "./wts/.env" ]; then
          echo "❌ .envファイルがリポジトリに含まれています！"
          exit 1
        fi

        # display_errorsが無効であることを確認
        if grep -rn "display_errors.*1" ./wts/ --include="*.php" | grep -v "display_errors.*0" | grep -v "CALENDAR_DEBUG_MODE" ; then
          echo "⚠️ 警告: display_errorsが有効なファイルがあります"
        fi

        echo "✅ セキュリティチェック完了"

    - name: 📦 デプロイ前バックアップ（SSH経由）
      env:
        SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_KEY" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        BACKUP_NAME="pre-deploy_$(date +%Y%m%d_%H%M%S)"
        ssh -p 10022 -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
          twinklemark@sv16114.xserver.jp \
          "cd ~/twinklemark.xsrv.jp/public_html/Smiley/taxi && \
           tar czf ~/backups/wts_${BACKUP_NAME}.tar.gz \
             --exclude='wts/.env' \
             --exclude='wts/sql' \
             wts/ && \
           echo 'Backup created: wts_${BACKUP_NAME}.tar.gz' && \
           ls -lh ~/backups/wts_${BACKUP_NAME}.tar.gz && \
           ls ~/backups/wts_*.tar.gz | head -n -5 | xargs -r rm -f && \
           echo 'Old backups cleaned (keeping last 5)'"
        rm -f ~/.ssh/deploy_key
        echo "✅ プリデプロイバックアップ完了"

    - name: 🔥 本番環境にデプロイ
      uses: SamKirkland/FTP-Deploy-Action@4.3.3
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./wts/
        server-dir: /tw1nkle.com/public_html/Smiley/taxi/wts/
        exclude: |
          **/.git*
          **/.gitignore
          **/README.md
          **/.github/**
          **/node_modules/**
          **/.env
          **/.env.example
          **/sql/**
        dry-run: false
        log-level: verbose

    - name: ✅ 本番デプロイ完了通知
      run: |
        echo "🎉 本番環境デプロイ完了！"
        echo "🌐 URL: https://tw1nkle.com/Smiley/taxi/wts/"
        echo "📝 デプロイ理由: ${{ github.event.inputs.message }}"
        echo "👤 実行者: ${{ github.actor }}"
        echo "📅 日時: $(date '+%Y-%m-%d %H:%M:%S UTC')"
