# ============================================================
# WTS テナント定義ファイル
# ============================================================
# フォーマット: テナントID  DB名  ベースパス  表示名
# 1行1テナント、#で始まる行はコメント、空行は無視
#
# テナントID: 英数字とハイフンのみ（ディレクトリ名に使用）
# DB名: XserverのMySQL DB名（Xserver管理パネルで事前作成が必要）
# ベースパス: URLのパス部分（APP_BASE_PATH に設定される）
# 表示名: system_settings の system_name に設定される値
# ============================================================

