<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500');</style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38B2AC"/>
      <stop offset="100%" stop-color="#2C7A7B"/>
    </linearGradient>
    <linearGradient id="lamp" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F6AD55"/>
      <stop offset="100%" stop-color="#ED8936"/>
    </linearGradient>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- 行灯 -->
  <rect x="198" y="70" width="116" height="60" rx="30" fill="url(#lamp)"/>
  <line x1="256" y1="130" x2="256" y2="152" stroke="#ED8936" stroke-width="12" stroke-linecap="round"/>

  <!-- にっこり顔 -->
  <ellipse cx="195" cy="220" rx="22" ry="25" fill="white"/>
  <ellipse cx="317" cy="220" rx="22" ry="25" fill="white"/>
  <path d="M170 300 Q256 370 342 300" stroke="white" stroke-width="18" stroke-linecap="round" fill="none"/>

  <!-- テキスト -->
  <text x="256" y="440" text-anchor="middle" font-family="'Zen Maru Gothic', sans-serif" font-size="72" font-weight="500" fill="white" opacity="0.95">スマルト</text>
</svg>
