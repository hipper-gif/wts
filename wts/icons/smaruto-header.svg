<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 48" fill="none">
  <defs>
    <style>@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500');</style>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38B2AC"/>
      <stop offset="100%" stop-color="#2C7A7B"/>
    </linearGradient>
    <linearGradient id="lamp" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F6AD55"/>
      <stop offset="100%" stop-color="#ED8936"/>
    </linearGradient>
  </defs>

  <!-- スマイル丸 -->
  <circle cx="22" cy="26" r="18" fill="url(#teal)"/>

  <!-- 行灯（タクシーの象徴）-->
  <rect x="15" y="4" width="14" height="8" rx="4" fill="url(#lamp)"/>
  <!-- 行灯の支え -->
  <line x1="22" y1="12" x2="22" y2="15" stroke="#ED8936" stroke-width="2" stroke-linecap="round"/>

  <!-- にっこり顔 -->
  <ellipse cx="16" cy="23" rx="2" ry="2.5" fill="white"/>
  <ellipse cx="28" cy="23" rx="2" ry="2.5" fill="white"/>
  <path d="M14 31 Q22 37 30 31" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- テキスト -->
  <text x="48" y="33" font-family="'Zen Maru Gothic', sans-serif" font-size="23" font-weight="500" fill="url(#teal)" letter-spacing="1.5">スマルト</text>
</svg>
